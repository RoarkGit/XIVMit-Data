name: Bump submodule in server repo

on:
  push:
    branches: [main]

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone server repo and bump submodule
        env:
          GH_TOKEN: ${{ secrets.SERVER_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/RoarkGit/xivmit.app.git server
          cd server
          git submodule update --init
          cd data
          git fetch origin main
          git checkout origin/main
          cd ..
          if git diff --quiet; then
            echo "Submodule already up to date"
            exit 0
          fi
          SHORT_SHA=$(cd data && git rev-parse --short HEAD)
          COMMIT_MSG=$(cd data && git log -1 --pretty=%s)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update game data (${SHORT_SHA}): ${COMMIT_MSG}"
          git push
