name: Deploy PR preview

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone server repo
        env:
          GH_TOKEN: ${{ secrets.SERVER_REPO_TOKEN }}
        run: git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/RoarkGit/xivmit.app.git server

      - name: Install pnpm
        run: npm i -g pnpm@10

      - name: Install js-yaml
        run: npm i js-yaml

      - name: Validate YAML data
        id: validate
        continue-on-error: true
        run: node scripts/validate.mjs . > /tmp/validation-report.md 2>&1

      - name: Post validation report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const report = fs.readFileSync('/tmp/validation-report.md', 'utf8').trim()
            const marker = '<!-- xivmit-yaml-validation -->'
            const body = `${marker}\n${report}`
            const prNumber = context.payload.pull_request.number
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })
            const existing = comments.find(c => c.body?.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }

      - name: Generate static API data
        run: node scripts/build-static-api.mjs . server/client/public

      - name: Build client in preview mode
        working-directory: server/client
        run: |
          pnpm install --frozen-lockfile
          VITE_PREVIEW=true pnpm build

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 pages deploy server/client/dist --project-name=xivmit-preview --branch=pr-${{ github.event.pull_request.number }} --commit-dirty=true

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const url = `https://pr-${prNumber}.xivmit-preview.pages.dev`;
            const body = `Preview deployed: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.startsWith('Preview deployed:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
